<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mentor Portal | First Aid System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>

<style>
body{background:#e5e7eb;font-family:Segoe UI,sans-serif;}

.sidebar{width:230px;min-height:100vh;background:#1f2937;position:fixed;}
.sidebar h4{color:white;}
.sidebar a{color:white;padding:15px;display:block;text-decoration:none;cursor:pointer;}
.sidebar a.active,.sidebar a:hover{background:#2563eb;}

.main{margin-left:230px;}

.topbar{
  height:60px;background:white;
  display:flex;justify-content:space-between;
  align-items:center;padding:0 20px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.content{padding:20px;}

.card-box{
  background:white;padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  margin-bottom:25px;
}

.logout-btn{
  background:#dc2626;color:white;
  border:none;padding:8px 16px;
  border-radius:5px;
}

.hidden{display:none;}

/* 🔥 ADMIN STYLE BIG CARD UI */
.medicine-grid{
  display:flex;
  justify-content:center;
  gap:40px;
}

.medicine-card{
  width:420px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  background:white;
}

/* TOP IMAGE */
.med-img{
  width:100%;
  height:260px;
  object-fit:contain;
  background:#f1f5f9;
  padding:20px;
}

/* BOTTOM BLUE AREA */
.med-body{
  background:#c7d4e9;
  text-align:center;
  padding:20px;
}

.med-title{
  font-size:22px;
  font-weight:bold;
  color:#1e3a8a;
}

.med-price{
  font-size:18px;
  color:#2563eb;
  margin-bottom:10px;
}

/* QTY */
.qty-box{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

.qty-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  font-size:18px;
}

.buy-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:15px;
  width:100%;
  border-radius:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h4 class="text-center py-3">Faculty Panel</h4>
  <a class="active" onclick="showSection('dashboard', this)">Dashboard</a>
  <a onclick="showSection('buy', this)">Buy Medicines</a>
</div>

<div class="main">
  <div class="topbar">
    <h5>First Aid Dashboard</h5>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboardSection">
      <div class="row mb-4">
        <div class="col-md-4">
          <div class="card-box text-center">
            <h6>Total Transactions</h6>
            <h2 id="totalTx">0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card-box text-center">
            <h6>Total Students</h6>
            <h2 id="totalStudents">0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card-box text-center">
            <h6>Total Amount</h6>
            <h2 id="totalAmount">₹0</h2>
          </div>
        </div>
      </div>

      <div class="card-box">
        <div class="d-flex justify-content-between mb-2">
          <h5>Student First Aid Usage</h5>
          <div>
            <button class="btn btn-success btn-sm" onclick="downloadPDF()">Download PDF</button>
            <button class="btn btn-warning btn-sm" onclick="clearData()">Clear Data</button>
          </div>
        </div>

        <table class="table table-bordered" id="reportTable">
          <thead class="table-primary">
            <tr>
              <th>Name</th>
              <th>ID</th>
              <th>Items</th>
              <th>Total</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="mentorTable"></tbody>
        </table>
      </div>
    </div>

    <!-- BUY SECTION -->
    <div id="buySection" class="hidden">

      <div class="card-box">
        <h5>Mentor Details</h5>
        <input id="mentorName" class="form-control mb-2" placeholder="Enter Mentor Name">
        <input id="mentorId" class="form-control" placeholder="Enter Mentor ID">
      </div>

      <div class="card-box">
        <h5 class="text-center mb-4">Select Medicines</h5>

        <div class="medicine-grid">

          <!-- Paracetamol -->
          <div class="medicine-card">
            <img src="paracetamol.jpg" class="med-img">
            <div class="med-body">
              <div class="med-title">Paracetamol</div>
              <div class="med-price">₹15</div>

              <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('mparacetamol',-1)">-</button>
                <span id="mparacetamol">0</span>
                <button class="qty-btn" onclick="changeQty('mparacetamol',1)">+</button>
              </div>
            </div>
          </div>

          <!-- Cetirizine -->
          <div class="medicine-card">
            <img src="cetirizine.jpg" class="med-img">
            <div class="med-body">
              <div class="med-title">Cetirizine</div>
              <div class="med-price">₹20</div>

              <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('mcetirizine',-1)">-</button>
                <span id="mcetirizine">0</span>
                <button class="qty-btn" onclick="changeQty('mcetirizine',1)">+</button>
              </div>
            </div>
          </div>

        </div>

        <button class="buy-btn mt-4" onclick="buyMentorItems()">Buy Now</button>
        <div id="mentorMsg" class="mt-3"></div>
      </div>

    </div>

  </div>
</div>

<!-- Firebase + JS SAME (NO CHANGE) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCygnTLWHYHXauMRfJGqqstWc1BayhcN9Q",
  databaseURL: "https://smartpillcom-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* SAME JS */
const mentorMedicines={
  mparacetamol:{price:15,name:"Paracetamol"},
  mcetirizine:{price:20,name:"Cetirizine"}
};

function changeQty(id,val){
  let el=document.getElementById(id);
  let q=parseInt(el.innerText)+val;
  if(q>=0) el.innerText=q;
}

function buyMentorItems(){
  let name=mentorName.value.trim();
  let id=mentorId.value.trim();
  if(!name||!id){alert("Enter details");return;}

  let items=[],total=0;

  for(let m in mentorMedicines){
    let q=parseInt(document.getElementById(m).innerText);
    if(q>0){
      items.push({name:mentorMedicines[m].name,qty:q});
      total+=q*mentorMedicines[m].price;
    }
  }

  if(items.length===0){alert("Select medicine");return;}

  db.ref("transactions").push({
    mentor:name,mentorId:id,items,total,time:new Date().toLocaleString()
  });

  mentorMsg.innerHTML=`<div class="alert alert-success">₹${total} Success</div>`;
}

function showSection(section,el){
  dashboardSection.classList.add("hidden");
  buySection.classList.add("hidden");
  if(section==="dashboard") dashboardSection.classList.remove("hidden");
  if(section==="buy") buySection.classList.remove("hidden");
}

function logout(){window.location="login.html";}
</script>

</body>
</html>
