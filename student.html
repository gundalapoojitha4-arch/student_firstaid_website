<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First Aid Student Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#eef2f7;
  font-family:Segoe UI,sans-serif;
}

.sidebar{
  width:230px;
  min-height:100vh;
  background:#1e3a8a;
  position:fixed;
}
.sidebar h4{color:white;}
.sidebar a{
  color:white;
  padding:15px;
  display:block;
  text-decoration:none;
}
.sidebar a.active,.sidebar a:hover{
  background:#2563eb;
}

.main{margin-left:230px;}

.topbar{
  background:white;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.content{padding:25px;}

.card-box{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  margin-bottom:25px;
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
}

.medicine-grid{
  display:flex;
  justify-content:space-between;
  gap:30px;
}

.medicine-card{
  width:48%;
  border-radius:20px;
  overflow:hidden;
  background:linear-gradient(135deg,#f0f4ff,#dbeafe);
  box-shadow:0 8px 25px rgba(37,99,235,0.2);
}

.med-img{
  width:100%;
  height:260px;
  object-fit:contain;
  padding:15px;
  background:white;
}

.med-body{
  padding:15px;
  text-align:center;
}

.med-title{
  font-size:20px;
  font-weight:bold;
  color:#1e3a8a;
}

.med-price{
  color:#2563eb;
  font-weight:bold;
  font-size:18px;
  margin-bottom:10px;
}

.qty-box{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.qty-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:6px 12px;
  font-weight:bold;
  border-radius:6px;
}

.qty{
  font-weight:bold;
  font-size:18px;
}

.buy-btn{
  background:#2563eb;
  color:white;
  border:none;
  width:100%;
  padding:14px;
  font-size:18px;
  border-radius:12px;
}

.logout-btn{
  background:#dc2626;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h4 class="text-center py-3">Student Panel</h4>
  <a class="active">Dashboard</a>
</div>

<div class="main">
  <div class="topbar">
    <h5>First Aid Student Portal</h5>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <!-- Student Details -->
    <div class="card-box">
      <h5>Student Details</h5>
      <input id="studentName" class="form-control mb-2" placeholder="Enter Student Name">
      <input id="regNo" class="form-control" placeholder="Enter Register Number">
    </div>

    <!-- Medicines -->
    <div class="card-box">
      <h5 class="text-center mb-4">Select Medicines</h5>

      <div class="medicine-grid">

        <!-- Paracetamol -->
        <div class="medicine-card">
          <img src="paracetamol.jpg" class="med-img">
          <div class="med-body">
            <div class="med-title">Paracetamol</div>
            <div class="med-price">₹15</div>

            <div class="qty-box">
              <button class="qty-btn" onclick="changeQty('paracetamol',-1)">-</button>
              <span class="qty" id="paracetamol">0</span>
              <button class="qty-btn" onclick="changeQty('paracetamol',1)">+</button>
            </div>
          </div>
        </div>

        <!-- Cetirizine -->
        <div class="medicine-card">
          <img src="cetirizine.jpg" class="med-img">
          <div class="med-body">
            <div class="med-title">Cetirizine</div>
            <div class="med-price">₹20</div>

            <div class="qty-box">
              <button class="qty-btn" onclick="changeQty('cetirizine',-1)">-</button>
              <span class="qty" id="cetirizine">0</span>
              <button class="qty-btn" onclick="changeQty('cetirizine',1)">+</button>
            </div>
          </div>
        </div>

      </div>

      <button class="buy-btn mt-4" onclick="buyItems()">Buy Now</button>
      <div id="msg" class="mt-3"></div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCygnTLWHYHXauMRfJGqqstWc1BayhcN9Q",
  authDomain: "smartpillcom.firebaseapp.com",
  databaseURL: "https://smartpillcom-default-rtdb.firebaseio.com",
  projectId: "smartpillcom",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Medicines
const medicines = {
  paracetamol:{price:15,name:"Paracetamol"},
  cetirizine:{price:20,name:"Cetirizine"}
};

// Quantity Change
function changeQty(id,val){
  let el = document.getElementById(id);
  let q = parseInt(el.innerText) + val;
  if(q >= 0) el.innerText = q;
}

// BUY FUNCTION (FINAL)
function buyItems(){

  let name = document.getElementById("studentName").value.trim();
  let reg = document.getElementById("regNo").value.trim();

  if(!name || !reg){
    alert("Enter student details");
    return;
  }

  let items = [];
  let total = 0;

  for(let id in medicines){
    let qty = parseInt(document.getElementById(id).innerText);

    if(qty > 0){
      items.push({
        name: medicines[id].name,
        qty: qty
      });
      total += qty * medicines[id].price;
    }
  }

  if(items.length === 0){
    alert("Select at least one medicine");
    return;
  }

  // ✅ STORE TRANSACTION
  db.ref("transactions").push({
    student: name,
    regno: reg,
    items: items,
    total: total,
    time: new Date().toLocaleString(),
    role: "student"
  });

  // 🔥 SEND TO DISPENSE (ESP32)
  db.ref("dispense").set({
    medicine: items[0].name,
    quantity: items[0].qty,
    status: "pending",
    type: "student",
    time: new Date().toLocaleString()
  });

  // SUCCESS MESSAGE
  document.getElementById("msg").innerHTML =
    `<div class="alert alert-success">
      ✅ Sent to Machine<br>
      <b>Total:</b> ₹${total}
    </div>`;

  // RESET
  document.getElementById("paracetamol").innerText = 0;
  document.getElementById("cetirizine").innerText = 0;
}

// LOGOUT
function logout(){
  window.location = "login.html";
}

</script>

</body>
</html>
